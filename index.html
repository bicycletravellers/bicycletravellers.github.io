---
---
<html>
  <head>
    <title>Bicycle Travellers</title>
    <meta name="robots" content="noindex">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css">
  </head>
  <body class = "w3-dark-gray w3-display-container">
    <div class = "w3-container w3-block w3-center w3-display-middle">
      <span class = "w3-large">We are still building this website...</span><br><br>
      <a href = "https://www.facebook.com/groups/bicycletravellers/"><button class = "w3-button w3-blue w3-hover-light-blue">Bicycle Travellers on Facebook</button></a>
    </div>
	<div class = "w3-container">
		<div class="posts">
		  {% for post in site.posts reversed %}
		  <div class="post">
			<h1 class="post-title">
			  <a href="{{ site.url }}{{ post.url }}">
				{{ post.title }}
			  </a>
			</h1>
			<div>
			<img src = "/public/cover/small/{{ post.image }}.png" align="left" class = "cover_img wnot" >
			<p>{{ post.excerpt  | strip_html  | truncatewords:35 }}</p>
			</div>
		  </div>
		  <hr />
		  {% endfor %}
		</div>

	</div>
  </body>
</html>
